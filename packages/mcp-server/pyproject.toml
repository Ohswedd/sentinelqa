[project]
name = "sentinelqa-mcp"
version = "0.1.0"
description = "SentinelQA MCP server — JSON-RPC over stdio/HTTP for the twelve PRD §16 sentinel.* tools. ADR-0023."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "ohswedd" }]
dependencies = [
    "sentinelqa",
    "sentinelqa-engine",
    "pydantic>=2.10",
    "pyyaml>=6.0",
]

[project.urls]
Repository = "https://github.com/Ohswedd/sentinelqa"

[project.scripts]
sentinelqa-mcp = "sentinelqa_mcp.__main__:_entry"

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sentinelqa_mcp"]

[tool.uv.sources]
sentinelqa = { workspace = true }
sentinelqa-engine = { workspace = true }
