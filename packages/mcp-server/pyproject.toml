[project]
name = "sentinelqa-mcp"
version = "1.6.0"
description = "SentinelQA MCP server — JSON-RPC over stdio/HTTP for the twelve the documentation* tools. ADR-0023."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "ohswedd" }]
keywords = [
    "sentinelqa",
    "mcp",
    "llm",
    "agent",
    "playwright",
    "testing",
    "qa",
    "json-rpc",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Testing",
    "Typing :: Typed",
]
dependencies = [
    "sentinelqa",
    "sentinelqa-engine",
    "pydantic>=2.10",
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://github.com/Ohswedd/sentinelqa"
Documentation = "https://github.com/Ohswedd/sentinelqa/tree/main/docs"
Repository = "https://github.com/Ohswedd/sentinelqa"
Issues = "https://github.com/Ohswedd/sentinelqa/issues"
Changelog = "https://github.com/Ohswedd/sentinelqa/blob/main/CHANGELOG.md"

[project.scripts]
sentinelqa-mcp = "sentinelqa_mcp.__main__:_entry"

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sentinelqa_mcp"]

[tool.uv.sources]
sentinelqa = { workspace = true }
sentinelqa-engine = { workspace = true }
