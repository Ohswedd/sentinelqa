<?xml version="1.0" encoding="UTF-8"?>
<!--
  SentinelQA primary mark (placeholder design).

  A shield silhouette with the monogram "SQ" inside, sized for a
  1:1 viewBox so it crops cleanly to favicon / app-icon / social-
  preview sizes.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     role="img"
     aria-label="SentinelQA logo">
  <title>SentinelQA</title>
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#082f49"/>
    </linearGradient>
  </defs>
  <!-- Shield body. -->
  <path d="M128 16 L224 48 L224 128 C224 184 184 224 128 240 C72 224 32 184 32 128 L32 48 Z"
        fill="url(#brand)"
        stroke="#0f766e"
        stroke-width="4"/>
  <!-- Inner shield bevel for depth. -->
  <path d="M128 32 L208 60 L208 128 C208 176 176 208 128 220 C80 208 48 176 48 128 L48 60 Z"
        fill="none"
        stroke="#22d3ee"
        stroke-width="2"
        opacity="0.7"/>
  <!-- Monogram. -->
  <text x="128" y="156"
        text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-weight="700"
        font-size="96"
        fill="#f0fdfa">SQ</text>
</svg>
