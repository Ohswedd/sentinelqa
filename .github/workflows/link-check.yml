name: Link check

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/link-check.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'

permissions:
  contents: read

jobs:
  lychee:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee on internal markdown links
        # Only verify relative/internal links to keep the gate deterministic
        # — external links are scanned periodically by a separate job once
        # lands. Failing on a broken internal link reflects an
        # actual repo bug.
        # `--base` is omitted: lychee 0.23 requires an absolute path or URL
        # there, and we only use relative links in this repo (no
        # root-relative `/foo/bar.md` references), so the default cwd-based
        # resolution works correctly.
        # `tests/golden/` is excluded because the Markdown goldens
        # produced by 's writer reference forward-looking
        # artifacts (`report.html` lands in ) and test-fixture
        # evidence paths (`traces/login.har`). The goldens are
        # byte-locked outputs of the renderer, not human-authored docs —
        # broken links inside them are by design.
        # `apps/docs/src/content/docs/` is the Astro Starlight content
        # tree. Its internal links use root-relative URLs
        # (`/modules/foo/`, `/errors/`) that resolve against the built
        # site, not against the filesystem. Lychee without `--base`
        # cannot reason about those — and Starlight's own build
        # (`astro build`) plus the Python scaffold test
        # (`tests/integration/docs/test_docs_site_scaffold.py`) already
        # validate that every sidebar / internal link resolves to a
        # page on disk before the docs site ships.
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --include-fragments
            --exclude-path node_modules
            --exclude-path .venv
            --exclude-path tests/golden
            --exclude-path apps/docs/src/content/docs
            './**/*.md'
          fail: true
