name: Link check

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/link-check.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'

permissions:
  contents: read

jobs:
  lychee:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee on internal markdown links
        # Only verify relative/internal links to keep the gate deterministic
        # — external links are scanned periodically by a separate job once
        # Phase 27 lands. Failing on a broken internal link reflects an
        # actual repo bug.
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --include-fragments
            --base .
            --exclude-path node_modules
            --exclude-path .venv
            --exclude-path plans/PROMT.md
            './**/*.md'
          fail: true
