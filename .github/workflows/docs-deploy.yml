name: Docs deploy

# Deploy the Astro Starlight docs site to Cloudflare
# Pages on every push to `main`, and preview-deploy every PR (except
# from forks, which cannot read the deploy secrets — Cloudflare's
# well-known limitation; documented in docs/dev/docs-deploy.md).

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'docs/**'
      - 'packages/shared-schema/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs-deploy.yml'
  pull_request:
    paths:
      - 'apps/docs/**'
      - 'docs/**'
      - 'packages/shared-schema/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs-deploy.yml'

permissions:
  contents: read
  pull-requests: write
  deployments: write

concurrency:
  group: docs-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-deploy:
    name: docs deploy (Cloudflare Pages)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@v4
        with:
          version: '0.5.24'
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install Python deps (frozen)
        # The docs generators (CLI / SDK / MCP / errors / ADR index)
        # run from Python; the site cannot build without them. We
        # install with `--all-packages` so the workspace members are
        # available to `make docs-gen-all`.
        run: uv sync --frozen --all-packages

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Set up Node 20 (with pnpm cache)
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm

      - name: Install Node deps (frozen)
        run: pnpm install --frozen-lockfile

      - name: Regenerate docs + build site
        # `make docs-build` chains `docs-gen-all` (CLI / SDK / MCP /
        # errors / ADR index) into `pnpm --filter @sentinelqa/docs
        # build`. The output lands at `apps/docs/dist/`.
        run: make docs-build

      - name: Detect deploy secrets
        id: secrets
        # Forks cannot read `secrets.*` — Cloudflare API token is
        # required to publish. Skip the deploy step rather than
        # failing the workflow.
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "have_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Docs deploy skipped::CLOUDFLARE_API_TOKEN is not set (likely a fork PR). Cloudflare Pages cannot deploy from forked PRs. The build above proves the site compiles; the publish step is owner-only."
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.secrets.outputs.have_secrets == 'true'
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # `${{ ... }}` in command must escape the project name so
          # it's expanded once, at job start.
          command: >-
            pages deploy apps/docs/dist
            --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
            --branch=${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL on PR
        if: |
          github.event_name == 'pull_request' &&
          steps.secrets.outputs.have_secrets == 'true' &&
          steps.deploy.outputs.deployment-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const body = [
              '### Docs preview',
              '',
              `Branch \`${{ github.head_ref }}\` → ${url}`,
              '',
              '_This preview rebuilds on every push to the PR._',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
