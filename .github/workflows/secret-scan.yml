name: Secret scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan the commit range, not just HEAD.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Match the local pre-commit hook pin to avoid version drift
          # (.pre-commit-config.yaml: gitleaks v8.21.4).
          GITLEAKS_VERSION: '8.21.4'
