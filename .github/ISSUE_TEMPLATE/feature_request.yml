name: Feature request
description: Propose a new SentinelQA capability or improvement.
title: 'feat: '
labels: ['feature', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Before filing: skim the docs site and the module catalog to see whether
        the capability is already covered. New capabilities that change a
        documented contract (CLI, SDK, MCP, config, scoring, reports) usually
        need an Architecture Decision Record — see
        [`docs/adr/`](https://github.com/Ohswedd/sentinelqa/tree/main/docs/adr).
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: One paragraph — what user pain or risk does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: One paragraph — the smallest change that solves the problem.
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area affected
      description: |
        e.g. `engine.runner`, `modules.security`, `apps/cli`, `packages/python-sdk`.
    validations:
      required: true
  - type: input
    id: differentiation
    attributes:
      label: Differentiation
      description: How does this strengthen SentinelQA's release-confidence story?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Bullet list of observable, testable outcomes.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety boundary impact
      description: |
        Does this involve scanning, browser automation against third parties,
        credential handling, or anything else that could touch the safety
        boundary? If yes, describe how the safe-by-default behavior is
        preserved.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Briefly: what other approaches did you weigh, and why is this one
        better?
