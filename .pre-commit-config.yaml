# SentinelQA pre-commit hooks.
# Install once per clone: `pre-commit install` (chained into `make install`).
# See docs/dev/secret-hygiene.md and CLAUDE.md §33.

default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # PRD.md and CLAUDE.md intentionally use trailing-double-space as a
      # Markdown hard line break (CommonMark §6.7). Excluding them from the
      # auto-fixers preserves the authoring style; they are still scanned by
      # gitleaks and detect-private-key below. Phase 03 report goldens
      # (`tests/golden/`) are byte-for-byte fixtures written by Python's
      # `json.dumps` / `xml.etree` / the Markdown writer — any whitespace
      # massage here would silently break the schema-drift guard.
      - id: trailing-whitespace
        exclude: ^(PRD\.md|CLAUDE\.md|tests/golden/)
      - id: end-of-file-fixer
        exclude: ^(PRD\.md|CLAUDE\.md|tests/golden/)
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=2048']
      - id: detect-private-key
        # The redaction tests carry a PEM-shaped fixture header so we can
        # prove redact() catches it. The body is junk text, not a key.
        # CLAUDE.md §33's intent (no real secrets in the tree) is upheld;
        # gitleaks still scans the same file thanks to .gitleaks.toml's
        # narrower fixture allowlist.
        exclude: ^tests/unit/policy/test_redaction\.py$
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.4
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Conventional Commits — runs at the commit-msg stage (CLAUDE.md §4).
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - '@commitlint/cli@19.6.0'
          - '@commitlint/config-conventional@19.6.0'

  # Pre-push: run the full quality-gate matrix before a branch leaves the
  # laptop (CLAUDE.md §4 + §17). Bypassing with --no-verify is forbidden
  # unless explicitly authorized.
  - repo: local
    hooks:
      - id: make-ci
        name: make ci (lint + typecheck + test)
        entry: make ci
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
