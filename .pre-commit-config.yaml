# SentinelQA pre-commit hooks.
# Install once per clone: `pre-commit install` (chained into `make install`).
# See docs/dev/secret-hygiene.md.

default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Report goldens (`tests/golden/`) are byte-for-byte fixtures written
      # by Python's `json.dumps` / `xml.etree` / the Markdown writer — any
      # whitespace massage here would silently break the schema-drift guard.
      - id: trailing-whitespace
        exclude: ^(tests/golden/|tests/integration/scoring/expected/|apps/docs/src/content/docs/(errors|cli|sdk|mcp|adrs)/)
      - id: end-of-file-fixer
        exclude: ^(tests/golden/|tests/integration/scoring/expected/|apps/docs/src/content/docs/(errors|cli|sdk|mcp|adrs)/)
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=2048']
      - id: detect-private-key
        # The redaction tests + parity fixture carry PEM-shaped fixture
        # headers so we can prove redact() catches them. The bodies are
        # junk text, not real keys; gitleaks still scans the same files
        # thanks to .gitleaks.toml's narrower fixture allowlist.
        exclude: |
          (?x)^(
            tests/unit/policy/test_redaction\.py|
            tests/golden/redaction/parity\.json|
            scripts/export-redaction-parity\.py|
            tests/unit/modules/security/test_secret_patterns\.py|
            tests/unit/modules/security/test_bundle_secrets\.py|
            tests/integration/modules/security/test_phase32_e2e\.py|
            tests/integration/release/test_built_packages\.py|
            tests/integration/release/test_secret_leak\.py
          )$
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.4
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Conventional Commits — runs at the commit-msg stage.
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - '@commitlint/cli@19.6.0'
          - '@commitlint/config-conventional@19.6.0'

  # Pre-push: run the full quality-gate matrix before a branch leaves the
  # laptop. Bypassing with --no-verify is forbidden unless explicitly
  # authorized.
  - repo: local
    hooks:
      - id: make-ci
        name: make ci (lint + typecheck + test)
        entry: make ci
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
