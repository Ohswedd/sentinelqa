# WCAG 2.2 AA (automated) — ADR-0046.
#
# This pack composes the accessibility module (axe-core
# WCAG 2.2 tags) with the compliance module's WCAG 2.2
# deterministic checks (focus-not-obscured, target-size-min,
# dragging-movements, redundant-entry, accessible-authentication).
#
# WORDING NOTE: the label says "(automated)" so the pack
# never claims a target is WCAG 2.2 compliant — only that the
# automated checks ran.

pack:
  id: wcag-2.2-aa
  label: WCAG 2.2 AA (automated)
  description: >-
    Automated WCAG 2.2 AA coverage — axe-core for the rules it
    supports, plus deterministic checks for SC 2.4.11, 2.5.7, 2.5.8,
    3.3.7, and 3.3.8.
  version: 1
  includes:
    - module: accessibility
      options:
        axe_tags:
          - wcag2a
          - wcag2aa
          - wcag21a
          - wcag21aa
          - wcag22a
          - wcag22aa
          - best-practice
    - module: compliance
      checks:
        - wcag22
  fail_on:
    - severity: critical
    - severity: high
  warn_on:
    - severity: medium
