{% extends "base.html" %}
{% block title %}Delete project — SentinelQA Django Demo{% endblock %}
{% block content %}
  <h2>Delete project</h2>
  <p>Really delete <strong>{{ project.name }}</strong>?</p>
  <form method="post">{% csrf_token %}
    <p><button type="submit">Delete</button> <a href="{% url 'projects' %}">Cancel</a></p>
  </form>
{% endblock %}
