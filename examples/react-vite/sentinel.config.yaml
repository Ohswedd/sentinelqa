# SentinelQA configuration for the React + Vite demo ().
# The app binds to 127.0.0.1:5173 by default — see README.md.
version: 1

project:
  name: sentinelqa-react-vite-example
  framework: react
  package_manager: pnpm

source:
  root: .
  include:
    - src
    - index.html
  exclude:
    - node_modules
    - dist

target:
  base_url: http://127.0.0.1:5173
  allowed_hosts:
    - 127.0.0.1
    - localhost

modules:
  functional: true
  api: false
  accessibility: true
  performance: true
  visual: false
  security: true
  chaos: false
  llm_audit: true

security:
  mode: safe
  destructive_tests: false
  max_requests_per_second: 5
  allowed_payload_level: low
  routes:
    - /
    - /login
    - /projects
  request_timeout_seconds: 15.0

discovery:
  engine: "playwright"
  max_depth: 2
  max_pages: 25
  rate_limit_rps: 5.0
  respect_robots: true
  same_host_only: true

accessibility:
  axe:
    tags:
      - wcag2a
      - wcag2aa

policy:
  min_quality_score: 85
